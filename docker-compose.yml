services:
  api:
    build:
      context: ./services/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      STARLOG_ENV: docker
      STARLOG_DB_PATH: /data/starlog.db
    volumes:
      - ./services/api:/app
      - starlog_data:/data
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./services/api
    command: python -m app.worker
    environment:
      STARLOG_ENV: docker
      STARLOG_DB_PATH: /data/starlog.db
    volumes:
      - ./services/api:/app
      - starlog_data:/data

volumes:
  starlog_data:
