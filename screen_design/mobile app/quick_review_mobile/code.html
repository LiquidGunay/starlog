<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Manrope:wght@200..800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "secondary-fixed": "#ffdcc0",
              "on-secondary-container": "#deab7e",
              "surface": "#10141a",
              "surface-container-lowest": "#0a0e14",
              "secondary-fixed-dim": "#f1bc8e",
              "on-surface": "#dfe2eb",
              "primary": "#c9beff",
              "primary-fixed-dim": "#c9beff",
              "on-tertiary-fixed": "#002020",
              "outline": "#938e9e",
              "inverse-primary": "#5f4bbe",
              "tertiary": "#83d4d3",
              "tertiary-container": "#55a7a6",
              "error": "#ffb4ab",
              "inverse-on-surface": "#2d3137",
              "on-error-container": "#ffdad6",
              "outline-variant": "#484553",
              "surface-variant": "#31353c",
              "surface-bright": "#353940",
              "primary-container": "#9c89ff",
              "background": "#10141a",
              "tertiary-fixed-dim": "#83d4d3",
              "on-error": "#690005",
              "tertiary-fixed": "#9ff1ef",
              "on-primary-fixed-variant": "#4731a4",

              "surface-tint": "#c9beff",

              "on-secondary": "#492907",
              "on-secondary-fixed-variant": "#633f1b",
              "on-background": "#dfe2eb",
              "error-container": "#93000a",
              "on-secondary-fixed": "#2d1600",
              "on-primary": "#30118e",
              "surface-container-high": "#262a31",
              "surface-container-low": "#181c22",
              "secondary": "#f1bc8e",
              "primary-fixed": "#e6deff"

            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .font-label { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel {
            background: rgba(201, 190, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(201, 190, 255, 0.15);
        }
        .glow-soft {
            box-shadow: 0 0 32px rgba(201, 190, 255, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Bar -->
<nav class="flex items-center justify-between px-6 py-4 bg-surface-container-lowest border-b border-outline-variant/15">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">hub</span>
<span class="font-headline font-bold text-xl tracking-tight">Starlog</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant">hub</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-primary/20">
<img alt="Commander Profile" class="w-full h-full object-cover" data-alt="Commander Profile Avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwzu1hwua6E_40WBHRBwDJFEK2ueeBFjDyhYwpwTQUqMH6M7VX_F6hFkDAgSOSNFB2d18DqHTQNsQpOqQ-k_ktc7y4fmrYtEk-GiLOvR3BPYi_Rr_GT3kRMBycAvYgLrlyQ2BjVYO4DkneNsCrxjGRidAuVbojuJZupG8AFHo6zM96NSxs9LJPnBDgcYO59D7uBZUD_4DWubzK6GbefEM0mrqIRHs5iqvctTPobooyQkZXTF8KszOxn0qGq7Zyr8Og0TSOCXDAdy0"/>
</div>
</div>
</nav>
<!-- Main Flashcard Canvas -->
<main class="flex-1 flex flex-col p-6 gap-6 relative">
<!-- Deck Stats / Progress -->
<div class="flex justify-between items-center px-2">
<div class="flex flex-col">
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Current Session</span>
<span class="text-sm font-headline font-medium text-primary">Neural Synchronization: 42%</span>
</div>
<div class="flex gap-2">
<div class="px-3 py-1 rounded-full bg-surface-container-high border border-outline-variant/15 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-error"></span>
<span class="text-xs font-label">12</span>
</div>
<div class="px-3 py-1 rounded-full bg-surface-container-high border border-outline-variant/15 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
<span class="text-xs font-label">85</span>
</div>
</div>
</div>
<!-- The Primary Flashcard -->
<div class="flex-1 flex items-center justify-center relative">
<!-- Background Card Decorations (Stacked appearance) -->
<div class="absolute w-[90%] h-full bg-surface-container-low rounded-xl translate-y-4 opacity-50 scale-95 blur-sm"></div>
<div class="relative w-full h-full max-h-[500px] glass-panel rounded-xl glow-soft flex flex-col items-center justify-center p-12 text-center group">
<div class="absolute top-6 left-6 flex items-center gap-2 text-on-surface-variant/40">
<span class="material-symbols-outlined text-sm">history</span>
<span class="text-[10px] font-label tracking-widest uppercase">Last seen: 4 days ago</span>
</div>
<!-- Card Content -->
<div class="flex flex-col gap-8 w-full">
<div class="space-y-2">
<span class="text-xs font-label text-secondary uppercase tracking-[0.2em]">Scientific Nomenclature</span>
<h2 class="text-4xl font-headline font-light tracking-tight text-on-surface leading-tight">
                            Nebular Nucleosynthesis
                        </h2>
</div>
<div class="h-[2px] w-12 bg-primary/20 mx-auto"></div>
<p class="text-lg text-on-surface-variant font-light leading-relaxed">
                        The process responsible for the formation of heavy elements within the core of collapsing stellar bodies.
                    </p>
</div>
<div class="absolute bottom-6 right-6">
<span class="material-symbols-outlined text-primary/30 text-4xl">visibility</span>
</div>
</div>
</div>
<!-- Rating Controls: SRS Buttons -->
<div class="grid grid-cols-4 gap-3 py-4">
<!-- Again -->
<button class="flex flex-col items-center justify-center gap-2 py-4 rounded-xl bg-surface-container border border-outline-variant/10 active:scale-95 transition-all">
<span class="text-xs font-label text-error/80 uppercase tracking-tighter">Again</span>
<span class="text-lg font-headline font-semibold text-on-surface">1m</span>
</button>
<!-- Hard -->
<button class="flex flex-col items-center justify-center gap-2 py-4 rounded-xl bg-surface-container border border-outline-variant/10 active:scale-95 transition-all">
<span class="text-xs font-label text-secondary/80 uppercase tracking-tighter">Hard</span>
<span class="text-lg font-headline font-semibold text-on-surface">2d</span>
</button>
<!-- Good -->
<button class="flex flex-col items-center justify-center gap-2 py-4 rounded-xl bg-primary/20 border border-primary/30 active:scale-95 transition-all">
<span class="text-xs font-label text-primary uppercase tracking-tighter">Good</span>
<span class="text-lg font-headline font-semibold text-on-surface">4d</span>
</button>
<!-- Easy -->
<button class="flex flex-col items-center justify-center gap-2 py-4 rounded-xl bg-surface-container border border-outline-variant/10 active:scale-95 transition-all">
<span class="text-xs font-label text-tertiary/80 uppercase tracking-tighter">Easy</span>
<span class="text-lg font-headline font-semibold text-on-surface">7d</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Shell Persistence) -->
<nav class="flex items-center justify-around py-3 px-6 bg-surface-container-lowest border-t border-outline-variant/15">
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">camera</span>
<span class="text-[10px] font-label uppercase tracking-widest text-primary">Capture</span>
</button>
<button class="flex flex-col items-center gap-1 group opacity-60 hover:opacity-100">
<span class="material-symbols-outlined text-on-surface">notifications_active</span>
<span class="text-[10px] font-label uppercase tracking-widest">Alarms</span>
</button>
<button class="flex flex-col items-center gap-1 group opacity-60 hover:opacity-100">
<span class="material-symbols-outlined text-on-surface">visibility</span>
<span class="text-[10px] font-label uppercase tracking-widest">Review</span>
</button>
</nav>
<!-- Subtle Background Texture -->
<div class="fixed inset-0 pointer-events-none opacity-20 -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary rounded-full blur-[120px] opacity-10"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-tertiary rounded-full blur-[100px] opacity-10"></div>
</div>
</body></html>
