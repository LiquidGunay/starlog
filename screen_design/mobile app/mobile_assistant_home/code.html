<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Starlog - Celestial Observatory</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface-dim": "#10141a",
                "surface-container-highest": "#31353c",
                "on-surface-variant": "#c9c4d5",
                "on-surface": "#dfe2eb",
                "primary": "#c9beff",
                "on-tertiary-container": "#003938",
                "surface-variant": "#31353c",
                "tertiary": "#83d4d3",
                "secondary-fixed": "#ffdcc0",
                "on-secondary-fixed": "#2d1600",
                "primary-container": "#9c89ff",
                "inverse-primary": "#5f4bbe",
                "tertiary-fixed": "#9ff1ef",
                "background": "#10141a",
                "on-primary-container": "#32148f",
                "inverse-on-surface": "#2d3137",
                "on-secondary-fixed-variant": "#633f1b",
                "primary-fixed-dim": "#c9beff",
                "surface-container-lowest": "#0a0e14",
                "surface-container-high": "#262a31",
                "secondary-container": "#633f1b",
                "surface-container-low": "#181c22",
                "on-tertiary": "#003737",
                "tertiary-container": "#55a7a6",
                "outline-variant": "#484553",
                "on-error": "#690005",
                "surface-container": "#1c2026",
                "on-tertiary-fixed": "#002020",
                "surface-tint": "#c9beff",
                "primary-fixed": "#e6deff",
                "on-tertiary-fixed-variant": "#00504f",
                "on-primary-fixed-variant": "#4731a4",
                "on-error-container": "#ffdad6",
                "on-secondary-container": "#deab7e",
                "tertiary-fixed-dim": "#83d4d3",
                "error": "#ffb4ab",
                "on-primary-fixed": "#1b0062",
                "secondary-fixed-dim": "#f1bc8e",
                "surface-bright": "#353940",
                "on-secondary": "#492907",
                "secondary": "#f1bc8e",
                "outline": "#938e9e",
                "on-background": "#dfe2eb",
                "surface": "#10141a",
                "inverse-surface": "#dfe2eb",
                "error-container": "#93000a",
                "on-primary": "#30118e"
              },
              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Manrope"],
                "label": ["Space Grotesk"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(201, 190, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 190, 255, 0.15);
        }
        .glow-shadow {
            box-shadow: 0 0 32px rgba(201, 190, 255, 0.08);
        }
        body {
            background-color: #10141a;
            color: #dfe2eb;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 px-6 py-4 flex items-center justify-between bg-background/80 backdrop-blur-md">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border border-primary/20 flex items-center justify-center overflow-hidden bg-surface-container">
<img alt="Neural Profile" class="w-full h-full object-cover" data-alt="Abstract neural profile representation with violet gradients" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBNr3S10INT2N4pq7KI6ArhOcPVzPzlvBoSI1AaPXdhq2_oNPQLTL0L9Jk_WIo-wQQuIND_LJsbmNGkdUQjhiFhOJ0-vGJ8WtgOcr9XAUYJE-NB5te3JAwy_PNU5B-21bqTFj2JnHW5iMn4PmiN_S_6LVpegvxoJTVIVvRj_1PSKGBmSVKY8qF1VNyVYGoTu9S4fW852zmzi6sncs3x6x2RjaOXYJ8z8OkEwWQKjqb8gxlRB2-ASfbuuaFxPOsavXAO3Hb2RcCgk0U"/>
</div>
<h1 class="font-headline text-xl font-medium tracking-tight text-on-surface">Starlog</h1>
</div>
<button class="p-2 rounded-xl bg-surface-container-high hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="sync">sync</span>
</button>
</header>
<main class="flex-1 px-6 pb-32 pt-4 flex flex-col gap-8 max-w-md mx-auto w-full">
<!-- Assistant Command Area -->
<section class="flex flex-col gap-6">
<div class="glass-panel p-6 rounded-xl flex flex-col gap-6 glow-shadow">
<div class="flex flex-col gap-1">
<span class="font-label text-xs uppercase tracking-widest text-primary/60">System Ready</span>
<h2 class="font-headline text-2xl font-semibold text-on-surface">Awaiting Command</h2>
</div>
<!-- Text Input -->
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all font-body" placeholder="Specify objective..." type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary/40" data-icon="terminal">terminal</span>
</div>
</div>
<!-- Execution Routing Info -->
<div class="grid grid-cols-3 gap-3">
<div class="bg-surface-container-low p-3 rounded-lg flex flex-col gap-1 border-l-2 border-primary">
<span class="font-label text-[10px] text-outline uppercase tracking-tighter">Engine</span>
<span class="text-xs font-medium text-primary">LLM-01</span>
</div>
<div class="bg-surface-container-low p-3 rounded-lg flex flex-col gap-1 border-l-2 border-tertiary">
<span class="font-label text-[10px] text-outline uppercase tracking-tighter">Audio</span>
<span class="text-xs font-medium text-tertiary">VOICE STT</span>
</div>
<div class="bg-surface-container-low p-3 rounded-lg flex flex-col gap-1 border-l-2 border-secondary">
<span class="font-label text-[10px] text-outline uppercase tracking-tighter">Output</span>
<span class="text-xs font-medium text-secondary">SPEECH</span>
</div>
</div>
</div>
<!-- Suggested Commands -->
<div class="flex flex-col gap-3">
<span class="font-label text-xs text-outline px-1">Suggested Sub-routines</span>
<div class="flex flex-wrap gap-2">
<button class="bg-surface-container text-on-surface text-sm px-4 py-2.5 rounded-full hover:bg-surface-container-highest transition-colors border border-outline-variant/20">
                        summarize latest artifact
                    </button>
<button class="bg-surface-container text-on-surface text-sm px-4 py-2.5 rounded-full hover:bg-surface-container-highest transition-colors border border-outline-variant/20">
                        create task
                    </button>
<button class="bg-surface-container text-on-surface text-sm px-4 py-2.5 rounded-full hover:bg-surface-container-highest transition-colors border border-outline-variant/20">
                        search for spaced repetition
                    </button>
</div>
</div>
</section>
<!-- Status Dashboard - Bento Style -->
<section class="grid grid-cols-2 gap-4">
<div class="col-span-2 glass-panel p-5 rounded-xl flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-tertiary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="temp_preferences_eco">temp_preferences_eco</span>
</div>
<div>
<div class="text-sm font-medium text-on-surface">Environmental Logic</div>
<div class="text-xs text-outline">Nominal state active</div>
</div>
</div>
<div class="text-right">
<div class="text-xl font-headline font-semibold text-tertiary">98%</div>
</div>
</div>
<div class="bg-surface-container-high p-5 rounded-xl flex flex-col gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="auto_awesome">auto_awesome</span>
<div>
<div class="text-2xl font-headline font-bold text-on-surface">12</div>
<div class="text-xs text-outline">Active Artifacts</div>
</div>
</div>
<div class="bg-surface-container-high p-5 rounded-xl flex flex-col gap-4">
<span class="material-symbols-outlined text-primary" data-icon="neurology">neurology</span>
<div>
<div class="text-2xl font-headline font-bold text-on-surface">4.2<span class="text-sm font-normal text-outline">ms</span></div>
<div class="text-xs text-outline">Latent Response</div>
</div>
</div>
</section>
</main>
<!-- FAB Voice Command -->
<div class="fixed bottom-24 right-6 z-50">
<button class="w-14 h-14 bg-primary text-on-primary rounded-2xl shadow-2xl flex items-center justify-center hover:scale-105 transition-transform active:scale-95 group overflow-hidden">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-3xl" data-icon="graphic_eq">graphic_eq</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 bg-background/90 backdrop-blur-xl border-t border-outline-variant/10 px-6 py-3 flex justify-around items-center z-40">
<button class="flex flex-col items-center gap-1 group">
<div class="p-1 rounded-full group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="mic">mic</span>
</div>
<span class="font-label text-[10px] text-primary tracking-wide">Capture</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="p-1 rounded-full group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="alarm">alarm</span>
</div>
<span class="font-label text-[10px] text-outline tracking-wide group-hover:text-primary">Alarms</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="p-1 rounded-full group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="history">history</span>
</div>
<span class="font-label text-[10px] text-outline tracking-wide group-hover:text-primary">Review</span>
</button>
</nav>
<!-- Decorative Background Elements -->
<div class="fixed -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none -z-10"></div>
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(circle_at_center,_rgba(201,190,255,0.03)_0%,_transparent_70%)] pointer-events-none -z-10"></div>
</body></html>
