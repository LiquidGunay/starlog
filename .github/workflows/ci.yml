name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install API dependencies
        run: uv sync --project services/api --extra dev
      - name: Lint
        run: |
          uv run --project services/api ruff check services/api
          uv run --project services/api mypy services/api/app
      - name: Test
        run: uv run --project services/api pytest services/api/tests -q
