<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starlog Desktop Helper</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(circle at top right, #1f315d, #0a1020);
        color: #e6eeff;
      }
      main {
        padding: 18px;
      }
      h1 {
        margin: 0 0 8px;
      }
      .card {
        border: 1px solid rgba(126, 168, 255, 0.35);
        background: rgba(17, 26, 50, 0.7);
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .label {
        color: #9db4dd;
        font-size: 13px;
        display: block;
        margin-top: 8px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      input {
        width: 100%;
        border: 1px solid rgba(126, 168, 255, 0.35);
        border-radius: 8px;
        padding: 8px;
        background: rgba(17, 26, 50, 0.7);
        color: #e6eeff;
      }
      button {
        border: 1px solid rgba(126, 168, 255, 0.35);
        border-radius: 999px;
        background: rgba(126, 168, 255, 0.14);
        color: #e6eeff;
        padding: 7px 10px;
        cursor: pointer;
      }
      #status {
        margin-top: 8px;
        color: #9db4dd;
        font-size: 13px;
      }
      .help {
        color: #9db4dd;
        font-size: 12px;
        margin: 0;
      }
      .recent-card {
        border-top: 1px solid rgba(126, 168, 255, 0.2);
        padding-top: 10px;
        margin-top: 10px;
      }
      .recent-title {
        margin: 0;
        font-size: 14px;
      }
      .recent-meta {
        margin: 4px 0 0;
        color: #9db4dd;
        font-size: 12px;
      }
      .recent-summary {
        margin: 6px 0 0;
        color: #dfe9ff;
        font-size: 13px;
      }
      .recent-preview-image {
        display: block;
        width: 100%;
        margin-top: 8px;
        border-radius: 10px;
        border: 1px solid rgba(126, 168, 255, 0.25);
        background: rgba(5, 9, 20, 0.9);
        object-fit: cover;
      }
      code {
        background: rgba(126, 168, 255, 0.15);
        padding: 2px 4px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Starlog Helper</h1>
      <div class="card">
        <p class="label">Hotkeys</p>
        <p class="help"><code>Cmd/Ctrl + Shift + C</code> clip clipboard to Starlog</p>
        <p class="help"><code>Cmd/Ctrl + Shift + S</code> screenshot clip (local OCR when available)</p>
      </div>

      <div class="card">
        <label class="label" for="apiBase">API base</label>
        <input id="apiBase" value="http://localhost:8000" />

        <label class="label" for="token">Bearer token</label>
        <input id="token" type="password" placeholder="paste token" />

        <div class="row">
          <button id="clipSelection">Clip Clipboard</button>
          <button id="clipScreenshot">Clip Screenshot</button>
        </div>
        <p id="status">Waiting for action</p>
      </div>

      <div class="card">
        <p class="label">Recent captures</p>
        <div id="recentCaptures">
          <p class="help">No captures yet.</p>
        </div>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
